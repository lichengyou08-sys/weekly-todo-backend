<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>每周待办事项 - 云端版</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        :root {
            --bg-gradient-start: #ffeef8;
            --bg-gradient-mid: #e8f4f8;
            --bg-gradient-end: #fff5e6;
            --text-primary: #8b7aa8;
            --card-bg: white;
            --text-dark: #333;
            --text-muted: #666;
            --border-light: #f0f0f0;
            --shadow: rgba(0,0,0,0.08);
        }

        body.dark-mode {
            --bg-gradient-start: #2d2d44;
            --bg-gradient-mid: #3a3a55;
            --bg-gradient-end: #4a4a6a;
            --text-primary: #ff9a9e;
            --card-bg: #3d3d5c;
            --text-dark: #f0f0f5;
            --text-muted: #b8b8c8;
            --border-light: #5a5a7a;
            --shadow: rgba(0,0,0,0.4);
        }

        body {
            font-family: 'Segoe UI', 'Microsoft YaHei', sans-serif;
            background: linear-gradient(135deg, var(--bg-gradient-start) 0%, var(--bg-gradient-mid) 50%, var(--bg-gradient-end) 100%);
            min-height: 100vh;
            padding: 20px;
            transition: background 0.3s ease;
            color: var(--text-dark);
        }

        .container { max-width: 1400px; margin: 0 auto; }
        h1 { text-align: center; color: var(--text-primary); margin-bottom: 30px; font-size: 2.5rem; }

        /* 登录/注册模态框 */
        .auth-modal {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.5);
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }
        .auth-modal.show { display: flex; }
        .auth-content {
            background: var(--card-bg);
            padding: 40px;
            border-radius: 25px;
            max-width: 400px;
            width: 90%;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
        }
        .auth-content h2 {
            color: var(--text-primary);
            margin-bottom: 25px;
            text-align: center;
        }
        .auth-content input {
            width: 100%;
            padding: 15px;
            margin-bottom: 15px;
            border: 2px solid var(--border-light);
            border-radius: 12px;
            background: var(--bg-gradient-mid);
            color: var(--text-dark);
            font-size: 1rem;
        }
        .auth-content button {
            width: 100%;
            padding: 15px;
            background: var(--text-primary);
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 1rem;
            cursor: pointer;
            margin-bottom: 10px;
        }
        .auth-content .switch-mode {
            text-align: center;
            color: var(--text-muted);
            cursor: pointer;
            font-size: 0.9rem;
        }

        /* 主界面 */
        .main-interface { display: none; }
        .main-interface.show { display: block; }

        .user-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            padding: 15px 25px;
            background: var(--card-bg);
            border-radius: 15px;
            box-shadow: 0 4px 15px var(--shadow);
        }
        .user-info { color: var(--text-muted); }
        .logout-btn {
            background: var(--text-primary);
            color: white;
            border: none;
            padding: 8px 20px;
            border-radius: 10px;
            cursor: pointer;
        }

        /* 主布局 */
        .main-layout {
            display: grid;
            grid-template-columns: 350px 1fr;
            gap: 25px;
        }
        @media (max-width: 1024px) {
            .main-layout { grid-template-columns: 1fr; }
        }

        /* 左侧总览 */
        .weekly-overview {
            background: var(--card-bg);
            border-radius: 25px;
            padding: 25px;
            box-shadow: 0 10px 30px var(--shadow);
            height: fit-content;
            position: sticky;
            top: 20px;
            max-height: calc(100vh - 40px);
            overflow-y: auto;
            z-index: 10;
        }
        .weekly-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            cursor: pointer;
            padding-bottom: 10px;
            margin-bottom: 10px;
        }
        .weekly-header h2 {
            color: var(--text-primary);
            font-size: 1.4rem;
            margin: 0;
        }
        .toggle-icon { font-size: 0.9rem; color: var(--text-muted); transition: transform 0.3s; }
        .weekly-overview.collapsed .toggle-icon { transform: rotate(-90deg); }
        .weekly-content { overflow: hidden; transition: max-height 0.3s, opacity 0.3s; max-height: 2000px; opacity: 1; }
        .weekly-overview.collapsed .weekly-content { max-height: 0; opacity: 0; }

        /* 右侧内容 */
        .right-content { display: flex; flex-direction: column; gap: 25px; }
        .week-navigation {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 20px;
        }
        .week-navigation button {
            background: var(--card-bg);
            border: none;
            width: 45px; height: 45px;
            border-radius: 50%;
            cursor: pointer;
            font-size: 1.2rem;
            box-shadow: 0 4px 15px var(--shadow);
            color: var(--text-primary);
        }
        .week-info {
            background: var(--card-bg);
            padding: 12px 35px;
            border-radius: 25px;
            font-weight: bold;
            color: var(--text-primary);
            box-shadow: 0 4px 15px var(--shadow);
        }

        /* 日期卡片 */
        .days-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 20px;
        }
        .day-card {
            background: var(--card-bg);
            border-radius: 25px;
            padding: 20px;
            box-shadow: 0 10px 30px var(--shadow);
            border: 2px solid transparent;
            transition: all 0.3s ease;
        }
        .day-card.today {
            border-color: var(--text-primary);
            box-shadow: 0 10px 30px var(--shadow), 0 0 20px rgba(139, 122, 168, 0.3);
        }
        .day-card.today .day-name {
            color: var(--text-primary);
        }
        .day-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
            padding-bottom: 12px;
            border-bottom: 2px solid var(--border-light);
        }
        .day-name { font-size: 1.2rem; font-weight: bold; color: var(--text-dark); }
        .day-date { font-size: 0.85rem; color: var(--text-muted); background: var(--bg-gradient-mid); padding: 4px 12px; border-radius: 12px; }

        /* 添加任务 */
        .add-task { display: flex; gap: 8px; margin-bottom: 15px; flex-wrap: wrap; }
        .add-task input[type="text"] {
            flex: 1; min-width: 150px;
            padding: 10px 15px;
            border: 2px solid var(--border-light);
            border-radius: 12px;
            background: var(--bg-gradient-mid);
            color: var(--text-dark);
        }
        .add-task select {
            padding: 10px;
            border: 2px solid var(--border-light);
            border-radius: 12px;
            background: var(--bg-gradient-mid);
            color: var(--text-dark);
        }
        .add-task button {
            background: var(--text-primary);
            color: white;
            border: none;
            padding: 10px 18px;
            border-radius: 12px;
            cursor: pointer;
            font-size: 1.2rem;
        }

        /* 任务列表 */
        .task-list { list-style: none; }
        .task-item {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 12px;
            background: var(--bg-gradient-mid);
            border-radius: 12px;
            margin-bottom: 8px;
        }
        .task-item.completed { opacity: 0.6; }
        .task-item.completed .task-text { text-decoration: line-through; color: var(--text-muted); }

        /* 自定义复选框 */
        .task-checkbox-wrapper {
            position: relative;
            width: 22px;
            height: 22px;
            flex-shrink: 0;
        }
        .task-checkbox-wrapper input {
            opacity: 0;
            width: 0;
            height: 0;
        }
        .custom-checkbox {
            position: absolute;
            top: 0;
            left: 0;
            width: 22px;
            height: 22px;
            background: white;
            border: 2px solid var(--text-primary);
            border-radius: 6px;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .task-checkbox-wrapper input:checked ~ .custom-checkbox {
            background: var(--text-primary);
        }
        .custom-checkbox::after {
            content: '';
            position: absolute;
            display: none;
            left: 6px;
            top: 2px;
            width: 5px;
            height: 10px;
            border: solid white;
            border-width: 0 2px 2px 0;
            transform: rotate(45deg);
        }
        .task-checkbox-wrapper input:checked ~ .custom-checkbox::after {
            display: block;
        }
        .task-text { flex: 1; font-size: 0.9rem; color: var(--text-dark); }
        .task-delete {
            background: var(--bg-gradient-start);
            color: var(--text-primary);
            border: none;
            padding: 5px 12px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 0.75rem;
        }

        /* 优先级标签 */
        .priority-badge {
            font-size: 0.7rem;
            padding: 2px 8px;
            border-radius: 10px;
            font-weight: bold;
        }
        .priority-high { background: linear-gradient(135deg, #ffb3ba 0%, #ff9aa2 100%); color: #8b4444; }
        .priority-medium { background: linear-gradient(135deg, #ffdac1 0%, #ffc8a8 100%); color: #8b5a3c; }
        .priority-low { background: linear-gradient(135deg, #c7ceea 0%, #b8c5e8 100%); color: #4a5585; }

        /* 模态框 */
        .modal {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.5);
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }
        .modal.show { display: flex; }
        .modal-content {
            background: var(--card-bg);
            padding: 30px;
            border-radius: 25px;
            max-width: 500px;
            width: 90%;
            max-height: 80vh;
            overflow-y: auto;
        }
        .modal-content h3 { margin-bottom: 20px; color: var(--text-primary); }
        .modal-buttons { display: flex; gap: 12px; justify-content: flex-end; margin-top: 20px; }
        .modal-buttons button { padding: 10px 20px; border: none; border-radius: 12px; cursor: pointer; }
        .modal-buttons .save { background: var(--text-primary); color: white; }
        .modal-buttons .cancel { background: var(--border-light); color: var(--text-muted); }

        /* 主题切换 */
        .theme-toggle {
            position: fixed;
            bottom: 20px; right: 20px;
            background: var(--card-bg);
            border: none;
            width: 50px; height: 50px;
            border-radius: 50%;
            cursor: pointer;
            font-size: 1.5rem;
            box-shadow: 0 4px 15px var(--shadow);
            z-index: 100;
        }

        /* 完成记录按钮 */
        .history-btn {
            position: fixed;
            bottom: 20px; right: 80px;
            background: var(--card-bg);
            border: none;
            width: 50px; height: 50px;
            border-radius: 50%;
            cursor: pointer;
            font-size: 1.5rem;
            box-shadow: 0 4px 15px var(--shadow);
            z-index: 100;
        }

        /* 补充样式 */
        .progress-bar {
            width: 100%;
            height: 10px;
            background: var(--bg-gradient-mid);
            border-radius: 5px;
            margin: 15px 0;
            overflow: hidden;
        }
        .repeat-icon {
            display: inline-flex;
            align-items: center;
            margin-right: 5px;
        }
        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, var(--text-primary), #ffb3ba);
            border-radius: 5px;
            transition: width 0.3s ease;
        }
        .weekly-stats {
            display: flex;
            justify-content: space-around;
            margin-top: 15px;
            padding-top: 15px;
            border-top: 1px solid var(--border-light);
        }
        .weekly-stat {
            text-align: center;
        }
        .weekly-stat-value {
            font-size: 1.5rem;
            font-weight: bold;
            color: var(--text-primary);
        }
        .weekly-stat-label {
            font-size: 0.8rem;
            color: var(--text-muted);
            margin-top: 5px;
        }
        .weekly-task-list {
            margin-bottom: 15px;
        }
        .weekly-task-item {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 8px;
            background: var(--bg-gradient-mid);
            border-radius: 10px;
            margin-bottom: 8px;
            font-size: 0.9rem;
        }
        .weekly-task-item.completed {
            opacity: 0.6;
        }
        .weekly-task-item.completed .weekly-task-text {
            text-decoration: line-through;
            color: var(--text-muted);
        }
        .weekly-task-day {
            font-size: 0.75rem;
            color: var(--text-primary);
            background: var(--card-bg);
            padding: 2px 8px;
            border-radius: 8px;
            white-space: nowrap;
        }
        .weekly-task-text {
            flex: 1;
            color: var(--text-dark);
        }
        .history-list {
            list-style: none;
            max-height: 300px;
            overflow-y: auto;
        }
        .history-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px;
            background: var(--bg-gradient-mid);
            border-radius: 10px;
            margin-bottom: 8px;
        }
        .history-text {
            flex: 1;
            color: var(--text-dark);
        }
        .history-date {
            font-size: 0.8rem;
            color: var(--text-muted);
        }
        @media (max-width: 768px) {
            body { padding: 10px; }
            h1 { font-size: 1.8rem; }
            .weekly-overview { position: relative; top: 0; max-height: none; }
            .day-card { padding: 15px; }
            .add-task { flex-direction: column; }
            .add-task input[type="text"] { width: 100%; }
            .add-task select { width: calc(50% - 4px); }
            .user-bar { flex-direction: column; gap: 10px; text-align: center; }
            .theme-toggle { bottom: 10px; right: 10px; width: 45px; height: 45px; font-size: 1.2rem; }
        }
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        .toast {
            position: fixed;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: var(--text-primary);
            color: white;
            padding: 12px 24px;
            border-radius: 25px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
            z-index: 2000;
            opacity: 0;
            transition: opacity 0.3s ease;
        }
        .toast.show {
            opacity: 1;
        }
    </style>
</head>
<body>
    <!-- 登录/注册模态框 -->
    <div class="auth-modal show" id="authModal">
        <div class="auth-content">
            <h2 id="authTitle">登录</h2>
            <input type="text" id="username" placeholder="用户名">
            <input type="password" id="password" placeholder="密码">
            <button onclick="handleAuth()" id="authBtn">登录</button>
            <div class="switch-mode" onclick="switchAuthMode()" id="switchText">还没有账号？点击注册</div>
        </div>
    </div>

    <!-- 主界面 -->
    <div class="main-interface" id="mainInterface">
        <button class="history-btn" onclick="openHistoryModal()" title="完成记录">📊</button>
        <button class="theme-toggle" onclick="toggleTheme()">🌙</button>
        
        <div class="container">
            <h1>🌸 每周待办事项</h1>
            
            <div class="user-bar">
                <div class="user-info">欢迎，<span id="currentUser"></span></div>
                <button class="logout-btn" onclick="logout()">退出登录</button>
            </div>

            <div class="main-layout">
                <!-- 左侧总览 -->
                <div class="weekly-overview" id="weeklyOverview">
                    <div class="weekly-header" onclick="toggleWeeklyOverview()">
                        <h2>📋 本周任务总览</h2>
                        <span class="toggle-icon">▼</span>
                    </div>
                    <div class="weekly-content" id="weeklyContent">
                        <div class="weekly-task-list" id="weeklyTaskList"></div>
                        <div class="progress-bar">
                            <div class="progress-fill" id="weeklyProgress" style="width: 0%"></div>
                        </div>
                        <div class="weekly-stats">
                            <div class="weekly-stat">
                                <div class="weekly-stat-value" id="weeklyTotal">0</div>
                                <div class="weekly-stat-label">总任务</div>
                            </div>
                            <div class="weekly-stat">
                                <div class="weekly-stat-value" id="weeklyCompleted">0</div>
                                <div class="weekly-stat-label">已完成</div>
                            </div>
                            <div class="weekly-stat">
                                <div class="weekly-stat-value" id="weeklyPending">0</div>
                                <div class="weekly-stat-label">待完成</div>
                            </div>
                        </div>
                    </div>
                </div>

                <!-- 右侧内容 -->
                <div class="right-content">
                    <div class="week-navigation">
                        <button onclick="changeWeek(-1)">◀</button>
                        <div class="week-info" id="weekInfo"></div>
                        <button onclick="changeWeek(1)">▶</button>
                    </div>
                    <div class="days-grid" id="daysGrid"></div>
                </div>
            </div>
        </div>
    </div>

    <!-- 历史记录模态框 -->
    <div class="modal" id="historyModal">
        <div class="modal-content">
            <h3>📊 完成记录</h3>
            <div style="display: flex; gap: 10px; margin-bottom: 15px;">
                <button onclick="showHistory('week')" class="toolbar-btn" style="flex: 1;">本周</button>
                <button onclick="showHistory('month')" class="toolbar-btn" style="flex: 1;">本月</button>
                <button onclick="showHistory('all')" class="toolbar-btn" style="flex: 1;">全部</button>
            </div>
            <ul class="history-list" id="historyList"></ul>
            <div class="modal-buttons">
                <button class="cancel" onclick="closeModal('historyModal')">关闭</button>
            </div>
        </div>
    </div>

    <script>
        // 全局变量
        let currentWeekOffset = 0;
        let isLoginMode = true;
        const weekDays = ['周一', '周二', '周三', '周四', '周五', '周六', '周日'];
        const dayClasses = ['monday', 'tuesday', 'wednesday', 'thursday', 'friday', 'saturday', 'sunday'];

        // 初始化
        document.addEventListener('DOMContentLoaded', () => {
            checkAuth();
            loadTheme();
        });

        // 检查登录状态
        async function checkAuth() {
            try {
                const response = await fetch('/api/check-auth', {
                    credentials: 'include'
                });
                if (response.ok) {
                    const data = await response.json();
                    if (data.authenticated) {
                        document.getElementById('currentUser').textContent = data.username;
                        showMainInterface();
                        initApp();
                    }
                }
            } catch (e) {
                console.error('Auth check failed:', e);
            }
        }

        // 登录/注册处理
        async function handleAuth() {
            const username = document.getElementById('username').value.trim();
            const password = document.getElementById('password').value;

            if (!username || !password) {
                alert('请输入用户名和密码');
                return;
            }

            const endpoint = isLoginMode ? '/api/login' : '/api/register';
            
            try {
                const response = await fetch(endpoint, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    credentials: 'include',
                    body: JSON.stringify({ username, password })
                });

                const data = await response.json();

                if (response.ok) {
                    if (isLoginMode) {
                        document.getElementById('currentUser').textContent = data.username;
                        showMainInterface();
                        initApp();
                    } else {
                        alert('注册成功，请登录');
                        switchAuthMode();
                    }
                } else {
                    alert(data.error || '操作失败');
                }
            } catch (e) {
                alert('网络错误，请稍后重试');
            }
        }

        // 切换登录/注册模式
        function switchAuthMode() {
            isLoginMode = !isLoginMode;
            document.getElementById('authTitle').textContent = isLoginMode ? '登录' : '注册';
            document.getElementById('authBtn').textContent = isLoginMode ? '登录' : '注册';
            document.getElementById('switchText').textContent = isLoginMode ? '还没有账号？点击注册' : '已有账号？点击登录';
            document.getElementById('username').value = '';
            document.getElementById('password').value = '';
        }

        // 退出登录
        async function logout() {
            try {
                await fetch('/api/logout', {
                    method: 'POST',
                    credentials: 'include'
                });
                location.reload();
            } catch (e) {
                console.error('Logout failed:', e);
            }
        }

        // 显示主界面
        function showMainInterface() {
            document.getElementById('authModal').classList.remove('show');
            document.getElementById('mainInterface').classList.add('show');
        }

        // 初始化应用
        function initApp() {
            loadWeeklyOverviewState();
            renderWeek();
            renderWeeklyTasks();
            setInterval(checkReminders, 60000);
        }

        // 获取周日期
        function getWeekDates(offset = 0) {
            const now = new Date();
            const currentDay = now.getDay();
            const diff = now.getDate() - currentDay + (currentDay === 0 ? -6 : 1) + (offset * 7);
            const monday = new Date(now.setDate(diff));
            
            const dates = [];
            for (let i = 0; i < 7; i++) {
                const date = new Date(monday);
                date.setDate(monday.getDate() + i);
                dates.push(date);
            }
            return dates;
        }

        function formatDate(date) {
            return `${date.getMonth() + 1}月${date.getDate()}日`;
        }

        function formatDateKey(date) {
            return `${date.getFullYear()}-${String(date.getMonth() + 1).padStart(2, '0')}-${String(date.getDate()).padStart(2, '0')}`;
        }

        // 渲染周视图
        async function renderWeek() {
            const dates = getWeekDates(currentWeekOffset);
            const today = new Date();
            document.getElementById('weekInfo').textContent = `${formatDate(dates[0])} - ${formatDate(dates[6])}`;
            
            const daysGrid = document.getElementById('daysGrid');
            daysGrid.innerHTML = '';
            
            for (let index = 0; index < dates.length; index++) {
                const date = dates[index];
                const dateKey = formatDateKey(date);
                const isToday = formatDateKey(today) === dateKey;
                
                // 从后端获取任务
                const tasks = await fetchTasks(dateKey);
                
                const dayCard = document.createElement('div');
                dayCard.className = `day-card ${dayClasses[index]} ${isToday ? 'today' : ''}`;
                dayCard.innerHTML = `
                    <div class="day-header">
                        <span class="day-name">${weekDays[index]}</span>
                        <span class="day-date">${formatDate(date)} ${isToday ? '今天' : ''}</span>
                    </div>
                    <div class="add-task">
                        <input type="text" id="input-${dateKey}" placeholder="添加新任务..." onkeydown="handleInputKeydown(event, '${dateKey}')">
                        <select id="priority-${dateKey}">
                            <option value="high">高</option>
                            <option value="medium" selected>中</option>
                            <option value="low">低</option>
                        </select>
                        <select id="repeat-${dateKey}">
                            <option value="none">不重复</option>
                            <option value="weekly">每周重复</option>
                        </select>
                        <button onclick="addTask('${dateKey}')">+</button>
                    </div>
                    <ul class="task-list" id="list-${dateKey}">
                        ${tasks.length === 0 ? 
                            '<li style="text-align: center; color: #aaa; padding: 20px;">暂无任务</li>' : 
                            tasks.map((task, taskIndex) => `
                                <li class="task-item ${task.completed ? 'completed' : ''}">
                                    <label class="task-checkbox-wrapper">
                                        <input type="checkbox" ${task.completed ? 'checked' : ''} onchange="toggleTask('${task.id}', ${task.completed})">
                                        <span class="custom-checkbox"></span>
                                    </label>
                                    <span class="task-text">${task.text}</span>
                                    ${task.is_repeat ? '<span class="repeat-icon" title="每周重复"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="vertical-align: middle; color: var(--text-primary);"><path d="M21.5 2v6h-6M2.5 22v-6h6M2 11.5a10 10 0 0 1 18.8-4.3M22 12.5a10 10 0 0 1-18.8 4.3"/></svg></span>' : ''}
                                    ${task.priority ? `<span class="priority-badge priority-${task.priority}">${getPriorityText(task.priority)}</span>` : ''}
                                    <button class="task-delete" onclick="deleteTask('${task.id}')">删除</button>
                                </li>
                            `).join('')
                        }
                    </ul>
                `;
                daysGrid.appendChild(dayCard);
            }
            
            updateStats();
        }

        // 从后端获取任务
        async function fetchTasks(dateKey) {
            try {
                const response = await fetch(`/api/tasks?date_key=${dateKey}`, {
                    credentials: 'include'
                });
                if (response.ok) {
                    const data = await response.json();
                    return data.tasks;
                }
            } catch (e) {
                console.error('Fetch tasks failed:', e);
            }
            return [];
        }

        // 添加任务
        async function addTask(dateKey) {
            const input = document.getElementById(`input-${dateKey}`);
            const prioritySelect = document.getElementById(`priority-${dateKey}`);
            const repeatSelect = document.getElementById(`repeat-${dateKey}`);
            const text = input.value.trim();
            
            if (!text) return;
            
            try {
                const response = await fetch('/api/tasks', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    credentials: 'include',
                    body: JSON.stringify({
                        text: text,
                        date_key: dateKey,
                        priority: prioritySelect.value,
                        is_repeat: repeatSelect.value === 'weekly'
                    })
                });
                
                if (response.ok) {
                    input.value = '';
                    repeatSelect.value = 'none';
                    renderWeek();
                    renderWeeklyTasks();
                }
            } catch (e) {
                alert('添加任务失败');
            }
        }

        // 切换任务状态
        async function toggleTask(taskId, currentCompleted) {
            try {
                const response = await fetch(`/api/tasks/${taskId}`, {
                    method: 'PUT',
                    headers: { 'Content-Type': 'application/json' },
                    credentials: 'include',
                    body: JSON.stringify({ completed: !currentCompleted })
                });
                
                if (response.ok) {
                    renderWeek();
                    renderWeeklyTasks();
                }
            } catch (e) {
                alert('更新任务失败');
            }
        }

        // 删除任务
        async function deleteTask(taskId) {
            if (!confirm('确定要删除这个任务吗？')) return;
            
            try {
                const response = await fetch(`/api/tasks/${taskId}`, {
                    method: 'DELETE',
                    credentials: 'include'
                });
                
                if (response.ok) {
                    renderWeek();
                    renderWeeklyTasks();
                }
            } catch (e) {
                alert('删除任务失败');
            }
        }

        // 其他辅助函数
        function getPriorityText(priority) {
            const map = { high: '高', medium: '中', low: '低' };
            return map[priority] || priority;
        }

        function handleInputKeydown(event, dateKey) {
            if (event.key === 'Enter') {
                event.preventDefault();
                addTask(dateKey);
            }
        }

        function changeWeek(direction) {
            currentWeekOffset += direction;
            renderWeek();
            renderWeeklyTasks();
        }

        // 主题切换
        function toggleTheme() {
            document.body.classList.toggle('dark-mode');
            const isDark = document.body.classList.contains('dark-mode');
            localStorage.setItem('theme', isDark ? 'dark' : 'light');
            document.querySelector('.theme-toggle').textContent = isDark ? '☀️' : '🌙';
        }

        function loadTheme() {
            const theme = localStorage.getItem('theme');
            if (theme === 'dark') {
                document.body.classList.add('dark-mode');
                document.querySelector('.theme-toggle').textContent = '☀️';
            }
        }

        // 折叠功能
        function toggleWeeklyOverview() {
            const overview = document.getElementById('weeklyOverview');
            const isCollapsed = overview.classList.toggle('collapsed');
            localStorage.setItem('weeklyOverviewCollapsed', isCollapsed ? 'true' : 'false');
        }

        function loadWeeklyOverviewState() {
            const isCollapsed = localStorage.getItem('weeklyOverviewCollapsed') === 'true';
            if (isCollapsed) {
                document.getElementById('weeklyOverview').classList.add('collapsed');
            }
        }

        // 模态框
        function openHistoryModal() {
            document.getElementById('historyModal').classList.add('show');
            showHistory('week');
        }

        function closeModal(modalId) {
            document.getElementById(modalId).classList.remove('show');
        }

        // 渲染左侧本周总览
        async function renderWeeklyTasks() {
            const dates = getWeekDates(currentWeekOffset);
            const weeklyList = document.getElementById('weeklyTaskList');
            weeklyList.innerHTML = '';

            let totalTasks = 0;
            let completedTasks = 0;

            for (let i = 0; i < dates.length; i++) {
                const date = dates[i];
                const dateKey = formatDateKey(date);
                const tasks = await fetchTasks(dateKey);

                tasks.forEach(task => {
                    totalTasks++;
                    if (task.completed) completedTasks++;

                    const item = document.createElement('div');
                    item.className = `weekly-task-item ${task.completed ? 'completed' : ''}`;
                    item.innerHTML = `
                        <span class="weekly-task-day">${weekDays[i]}</span>
                        <span class="weekly-task-text">${escapeHtml(task.text)}</span>
                        ${task.is_repeat ? '<span class="repeat-icon" title="每周重复"><svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="vertical-align: middle; color: var(--text-primary);"><path d="M21.5 2v6h-6M2.5 22v-6h6M2 11.5a10 10 0 0 1 18.8-4.3M22 12.5a10 10 0 0 1-18.8 4.3"/></svg></span>' : ''}
                        ${task.priority ? `<span class="priority-badge priority-${task.priority}">${getPriorityText(task.priority)}</span>` : ''}
                    `;
                    weeklyList.appendChild(item);
                });
            }

            if (totalTasks === 0) {
                weeklyList.innerHTML = '<div style="text-align: center; color: #aaa; padding: 20px;">本周暂无任务</div>';
            }

            // 更新统计
            document.getElementById('weeklyTotal').textContent = totalTasks;
            document.getElementById('weeklyCompleted').textContent = completedTasks;
            document.getElementById('weeklyPending').textContent = totalTasks - completedTasks;
            document.getElementById('weeklyProgress').style.width = totalTasks > 0 ? `${(completedTasks/totalTasks*100)}%` : '0%';
        }

        // HTML转义防止XSS
        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        // 更新统计
        async function updateStats() {
            try {
                const response = await fetch('/api/stats', {
                    credentials: 'include'
                });
                if (response.ok) {
                    const data = await response.json();
                    document.getElementById('weeklyTotal').textContent = data.total;
                    document.getElementById('weeklyCompleted').textContent = data.completed;
                    document.getElementById('weeklyPending').textContent = data.pending;
                    document.getElementById('weeklyProgress').style.width = data.total > 0 ? `${(data.completed/data.total*100)}%` : '0%';
                }
            } catch (e) {
                console.error('Update stats failed:', e);
            }
        }

        // 显示历史记录
        async function showHistory(period) {
            try {
                const response = await fetch(`/api/history?period=${period}`, {
                    credentials: 'include'
                });
                if (response.ok) {
                    const data = await response.json();
                    const historyList = document.getElementById('historyList');

                    if (data.history.length === 0) {
                        historyList.innerHTML = '<li style="text-align: center; color: #aaa; padding: 20px;">暂无完成记录</li>';
                        return;
                    }

                    historyList.innerHTML = data.history.map(item => `
                        <li class="history-item">
                            <span class="history-text">${escapeHtml(item.text)}</span>
                            <span class="history-date">${formatHistoryDate(item.completed_at)}</span>
                        </li>
                    `).join('');
                }
            } catch (e) {
                console.error('Fetch history failed:', e);
            }
        }

        // 格式化历史日期
        function formatHistoryDate(dateStr) {
            const date = new Date(dateStr);
            return `${date.getMonth() + 1}月${date.getDate()}日 ${String(date.getHours()).padStart(2, '0')}:${String(date.getMinutes()).padStart(2, '0')}`;
        }

        // 显示提示
        function showToast(message) {
            const existing = document.querySelector('.toast');
            if (existing) existing.remove();

            const toast = document.createElement('div');
            toast.className = 'toast';
            toast.textContent = message;
            document.body.appendChild(toast);

            setTimeout(() => toast.classList.add('show'), 10);
            setTimeout(() => {
                toast.classList.remove('show');
                setTimeout(() => toast.remove(), 300);
            }, 2000);
        }

        // 提醒功能
        function checkReminders() {
            const now = new Date();
            const currentTime = `${String(now.getHours()).padStart(2, '0')}:${String(now.getMinutes()).padStart(2, '0')}`;

            // 这里可以添加提醒逻辑
            // 由于需要后端支持提醒时间，暂时简化
        }

        // 点击模态框外部关闭
        document.querySelectorAll('.modal').forEach(modal => {
            modal.addEventListener('click', (e) => {
                if (e.target === modal) {
                    modal.classList.remove('show');
                }
            });
        });

        // 键盘快捷键
        document.addEventListener('keydown', (e) => {
            if (e.key === 'Escape') {
                document.querySelectorAll('.modal.show').forEach(modal => {
                    modal.classList.remove('show');
                });
            }
        });
    </script>
</body>
</html>
